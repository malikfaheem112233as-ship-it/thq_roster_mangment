<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THQH Sillanwali | Medical Duty Informer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .roster-scroll {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        .roster-scroll::-webkit-scrollbar { height: 8px; }
        .roster-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        
        .day-cell {
            min-width: 40px;
            text-align: center;
            font-size: 10px;
            border-right: 1px solid #f1f5f9;
            transition: all 0.2s;
        }
        
        .shift-M { background-color: #ecfdf5; color: #059669; font-weight: bold; }
        .shift-E { background-color: #fffbeb; color: #d97706; font-weight: bold; }
        .shift-N { background-color: #eef2ff; color: #4f46e5; font-weight: bold; }
        .shift-OFF { background-color: #fef2f2; color: #dc2626; font-weight: normal; opacity: 0.5; }
        
        .sticky-col {
            position: sticky;
            left: 0;
            background: white;
            z-index: 10;
            border-right: 2px solid #e2e8f0;
        }

        .filter-btn.active {
            background-color: #0d9488;
            color: white;
            border-color: #0d9488;
        }
        
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <header class="bg-teal-800 text-white shadow-lg sticky top-0 z-[60]">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-3xl">⚕️</span>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">THQ Hospital Sillanwali</h1>
                    <p class="text-teal-200 text-xs font-medium uppercase tracking-wider">Staff Duty Information Portal</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative">
                    <input type="text" id="globalSearch" placeholder="Search by name..." class="bg-teal-900 border border-teal-700 text-white text-sm rounded-lg px-4 py-2 w-48 lg:w-64 outline-none focus:ring-2 focus:ring-teal-400 placeholder-teal-400">
                </div>
                <button onclick="askGeminiAboutRoster()" class="bg-white text-teal-800 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-teal-50 transition-all flex items-center gap-2">
                    ✨ Ask Gemini About My Duty
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 lg:p-8 space-y-6">

        <!-- AI MODAL -->
        <div id="aiModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[85vh] overflow-hidden flex flex-col">
                <div class="p-6 border-b flex justify-between items-center bg-teal-50">
                    <h3 class="text-lg font-bold text-teal-900 flex items-center gap-2">✨ Duty Information Desk</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
                </div>
                <div id="aiContent" class="p-8 overflow-y-auto text-slate-700 leading-relaxed prose prose-teal max-w-none"></div>
                <div class="p-4 border-t bg-slate-50 text-right">
                    <button onclick="closeModal()" class="px-6 py-2 bg-teal-800 text-white rounded-lg font-bold text-sm hover:bg-teal-900 transition-colors">Understood</button>
                </div>
            </div>
        </div>

        <!-- FILTERS PANEL -->
        <section class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex flex-wrap gap-2">
                <span class="text-xs font-bold text-slate-400 uppercase w-full mb-1">Category:</span>
                <button onclick="setCategory('All')" class="filter-btn active px-3 py-1.5 rounded-md border text-xs font-bold transition-all" id="cat-All">All Staff</button>
                <button onclick="setCategory('Doctor')" class="filter-btn px-3 py-1.5 rounded-md border text-xs font-bold transition-all" id="cat-Doctor">Doctors</button>
                <button onclick="setCategory('Pharmacist')" class="filter-btn px-3 py-1.5 rounded-md border text-xs font-bold transition-all" id="cat-Pharmacist">Pharmacists</button>
                <button onclick="setCategory('Nurse')" class="filter-btn px-3 py-1.5 rounded-md border text-xs font-bold transition-all" id="cat-Nurse">Nursing Staff</button>
            </div>
            <div class="flex flex-wrap gap-2">
                <span class="text-xs font-bold text-slate-400 uppercase w-full mb-1">Quick Shift Filter:</span>
                <button onclick="setShift('Morning')" class="px-3 py-1.5 rounded-md border border-emerald-200 text-emerald-700 bg-emerald-50 text-xs font-bold hover:bg-emerald-100 transition-all">Morning</button>
                <button onclick="setShift('Evening')" class="px-3 py-1.5 rounded-md border border-amber-200 text-amber-700 bg-amber-50 text-xs font-bold hover:bg-amber-100 transition-all">Evening</button>
                <button onclick="setShift('Night')" class="px-3 py-1.5 rounded-md border border-indigo-200 text-indigo-700 bg-indigo-50 text-xs font-bold hover:bg-indigo-100 transition-all">Night</button>
                <button onclick="setShift('All')" class="px-3 py-1.5 rounded-md border border-slate-200 text-slate-600 bg-slate-50 text-xs font-bold hover:bg-slate-100 transition-all">Clear Shift</button>
            </div>
        </section>

        <!-- ROSTER SECTION -->
        <section class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-slate-900">March 2026 Master Roster</h2>
                    <p class="text-slate-500 text-sm" id="rosterSubtext">Displaying all departments and professional categories.</p>
                </div>
            </div>

            <div class="roster-scroll overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1600px]">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 border-b border-slate-200">
                            <th class="px-4 py-4 sticky-col min-w-[240px] text-xs font-bold uppercase tracking-wider">Staff Details & Station</th>
                            <script>
                                for(let i=1; i<=31; i++) {
                                    document.write(`<th class="day-cell py-4 font-bold text-[10px] border-r border-slate-200">${i}<br>MAR</th>`);
                                }
                            </script>
                            <th class="px-4 py-4 text-xs font-bold uppercase text-center">AI Brief</th>
                        </tr>
                    </thead>
                    <tbody id="masterTableBody">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const apiKey = ""; 
        
        const staffData = [
            // Doctors
            { name: "Dr. Taj Muhammad", rank: "APMO", category: "Doctor", place: "Room 1-B Male OPD", shift: "Morning", pattern: ["M","M","OFF","M","M","M","M"], id: 1 },
            { name: "Dr. Aamir Abdullah", rank: "Surgeon", category: "Doctor", place: "Room 2 OPD + OT", shift: "Morning", pattern: ["M","M","M","OFF","M","M","M"], id: 2 },
            { name: "Dr. Sidra Aslam", rank: "WMO", category: "Doctor", place: "Emergency + MLC", shift: "Morning", pattern: ["M","OFF","M","M","M","M","M"], id: 3 },
            { name: "Dr. Anjam Shehzad", rank: "MO", category: "Doctor", place: "Emergency + MLC", shift: "Evening", pattern: ["E","E","E","E","OFF","E","E"], id: 4 },
            { name: "Dr. M. Amad Hassan", rank: "MO", category: "Doctor", place: "Emergency + Indoor", shift: "Night", pattern: ["N","N","N","N","N","OFF","N"], id: 5 },
            
            // Pharmacists
            { name: "Mr. Usman Ghani", rank: "Pharmacist", category: "Pharmacist", place: "Main Pharmacy", shift: "Morning", pattern: ["M","M","M","M","M","OFF","M"], id: 6 },
            { name: "Ms. Amina Bibi", rank: "Pharmacist", category: "Pharmacist", place: "Indoor Pharmacy", shift: "Evening", pattern: ["E","E","E","OFF","E","E","E"], id: 7 },
            
            // Nurses
            { name: "Ms. Razia Sultana", rank: "Charge Nurse", category: "Nurse", place: "Emergency Ward", shift: "Night", pattern: ["N","N","OFF","N","N","N","N"], id: 8 },
            { name: "Ms. Nasreen Akhtar", rank: "Charge Nurse", category: "Nurse", place: "Gynae Ward", shift: "Morning", pattern: ["M","M","M","M","M","M","OFF"], id: 9 },
            { name: "Ms. Bushra Perveen", rank: "Head Nurse", category: "Nurse", place: "OT/Recovery", shift: "Morning", pattern: ["M","M","OFF","M","M","M","M"], id: 10 }
        ];

        let currentCategory = 'All';
        let currentShift = 'All';
        let currentSearch = '';

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`cat-${cat}`).classList.add('active');
            populateRoster();
        }

        function setShift(shift) {
            currentShift = shift;
            populateRoster();
        }

        function populateRoster() {
            const tbody = document.getElementById('masterTableBody');
            tbody.innerHTML = '';
            
            const filtered = staffData.filter(s => {
                const catMatch = currentCategory === 'All' || s.category === currentCategory;
                const shiftMatch = currentShift === 'All' || s.shift === currentShift;
                const searchMatch = s.name.toLowerCase().includes(currentSearch.toLowerCase());
                return catMatch && shiftMatch && searchMatch;
            });

            filtered.forEach(staff => {
                const row = document.createElement('tr');
                row.className = "border-b border-slate-100 hover:bg-slate-50 transition-colors";
                
                let cells = `
                    <td class="px-4 py-4 sticky-col shadow-sm">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold text-teal-600 uppercase tracking-tighter mb-0.5">${staff.category}</span>
                            <span class="text-xs font-bold text-slate-900">${staff.name}</span>
                            <span class="text-[10px] text-slate-500 font-medium">${staff.place}</span>
                        </div>
                    </td>
                `;

                for(let day=1; day<=31; day++) {
                    const shiftType = staff.pattern[(day-1) % 7];
                    cells += `<td class="day-cell py-4 shift-${shiftType}">${shiftType}</td>`;
                }

                cells += `
                    <td class="px-4 py-4 text-center">
                        <button onclick="aiDutyBrief(${staff.id})" class="text-[10px] bg-slate-100 text-slate-700 px-2 py-1.5 rounded font-black hover:bg-teal-600 hover:text-white transition-all uppercase">✨ Info</button>
                    </td>
                `;
                
                row.innerHTML = cells;
                tbody.appendChild(row);
            });

            document.getElementById('rosterSubtext').innerText = `Displaying ${filtered.length} staff members (Filter: ${currentCategory} / Shift: ${currentShift})`;
        }

        async function geminiCall(prompt, systemPrompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Duty data unavailable.";
            } catch (e) { return "Connection error."; }
        }

        async function aiDutyBrief(id) {
            const staff = staffData.find(s => s.id === id);
            const content = document.getElementById('aiContent');
            document.getElementById('aiModal').classList.remove('hidden');
            content.innerHTML = '<div class="flex flex-col items-center py-16"><div class="w-10 h-10 border-4 border-teal-600 border-t-transparent rounded-full animate-spin"></div><p class="mt-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Consulting Master Roster...</p></div>';

            const prompt = `Staff Info: ${staff.name} (${staff.category}). 
            Location: ${staff.place}. 
            Base Shift: ${staff.shift}. 
            7-Day Rotation Pattern: ${staff.pattern.join(', ')}.
            Provide a direct briefing about:
            1. Their exact duty location and professional category duties.
            2. Shift hours (Morning 8AM-2PM, Evening 2PM-8PM, Night 8PM-8AM).
            3. Explicitly list which days are their OFF days in March 2026.
            4. Remind them of punctuality.`;

            const result = await geminiCall(prompt, "You are the Institutional Duty Desk Informer at THQH Sillanwali. Be precise and professional.");
            content.innerHTML = `<div class="bg-teal-50 p-4 rounded-lg mb-4 border border-teal-100"><h4 class="text-lg font-bold text-teal-900">${staff.name}</h4><p class="text-[10px] font-bold text-teal-600 uppercase">${staff.category} Duty Assignment</p></div>` + result.replace(/\n/g, '<br>');
        }

        async function askGeminiAboutRoster() {
            const nameInput = document.getElementById('globalSearch').value;
            if(!nameInput) {
                const content = document.getElementById('aiContent');
                document.getElementById('aiModal').classList.remove('hidden');
                content.innerHTML = `<div class="p-6 text-center"><p class="text-amber-600 font-bold italic">Please type your name in the search box first so I can find you in the roster!</p></div>`;
                return;
            }
            aiDutyBrief(staffData.find(s => s.name.toLowerCase().includes(nameInput.toLowerCase()))?.id || 1);
        }

        function closeModal() { document.getElementById('aiModal').classList.add('hidden'); }

        document.getElementById('globalSearch').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            populateRoster();
        });

        window.onload = () => populateRoster();
    </script>
</body>
</html>
